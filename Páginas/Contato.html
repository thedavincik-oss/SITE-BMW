</head>

        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
                    <img src="../Imagens/icons8-bmw.svg" alt="Logo BMW" width="40" height="40">BMW
                </a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

                </button>
                
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html">Início</a>

                        <li class="nav-item">

                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="https://www.youtube.com/BMW" target="_blank">

                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="container my-5">
            <h2 class="text-center mb-5">Entre em Contato</h2>
            
            <div class="row g-4 align-items-stretch">
                
                <div class="col-lg-6">
                    <form class="p-4 border rounded shadow-sm bg-light h-100">
                        <div class="mb-3">
                            <label for="nome" class="form-label fw-bold">Nome completo</label>
                            <input type="text" class="form-control" id="nome" placeholder="Seu nome">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label fw-bold">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="seu@email.com">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="telefone" class="form-label fw-bold">Telefone</label>
                                <input type="tel" class="form-control" id="telefone" placeholder="(61) 99999-9999">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="assunto" class="form-label fw-bold">Assunto</label>
                            <select class="form-select" id="assunto">
                                <option selected disabled>Selecione um assunto...</option>
                                <option>Test Drive</option>
                                <option>Financiamento</option>
                                <option>Revisão e Manutenção</option>
                                <option>Outros</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="mensagem" class="form-label fw-bold">Mensagem</label>
                            <textarea class="form-control" id="mensagem" rows="4" placeholder="Escreva sua mensagem..."></textarea>
                        </div>
                        
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="aceito">
                            <label class="form-check-label text-muted" for="aceito">
                                Aceito receber novidades e ofertas da BMW por e-mail
                            </label>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-4 mt-auto">
                            <button type="submit" class="btn btn-outline-dark px-4 me-md-2">Enviar mensagem</button>
                            
                            <a href="https://wa.me/5561982991898?text=Olá!%20Estou%20no%20site%20da%20BMW%20e%20gostaria%20de%20comprar%20um%20veículo." target="_blank" class="btn btn-success px-4 fw-bold">
                                <i class="fa-brands fa-whatsapp fs-5 me-2 align-middle"></i> Comprar via WhatsApp
                            </a>
                        </div>
                    </form>
                </div>

                <div class="col-lg-6">
                    <div class="h-100 shadow-sm rounded overflow-hidden border">
                        <iframe src="https://maps.google.com/maps?q=BMW%20Brasília&t=&z=13&ie=UTF8&iwloc=B&output=embed" width="100%" height="100%" style="border:0; min-height: 450px;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>

            </div>
        </section>

                    <i class="fa-brands fa-facebook"></i>
                </a>
                <a href="https://www.youtube.com/user/BMW" target="_blank" class="text-white">
                    <i class="fa-brands fa-youtube"></i>
                </a>
            </div>
        </div>
    </footer>
